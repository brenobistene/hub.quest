# Alembic config — Hub Quest
#
# Projeto usa sqlite3 puro (sem SQLAlchemy ORM). Alembic ainda funciona —
# migrations escritas com op.execute() em SQL raw. Ver alembic/README.md.
#
# Path do DB: relativo a apps/api/ (mesmo diretório do alembic.ini).

[alembic]
script_location = alembic
sqlalchemy.url = sqlite:///hubquest.db

# Template de nome dos arquivos de migration: timestamp + slug.
# Ex: 2026_05_11_2030-add_health_metrics_a1b2c3d4.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s_%%(rev)s

# Timezone das timestamps nos filenames.
timezone = America/Sao_Paulo

# Limita slug do nome de arquivo (depois disso só hash).
truncate_slug_length = 40

[post_write_hooks]
# Hooks pós-criação de migration vazios — Alembic deixa o arquivo como gerou.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
