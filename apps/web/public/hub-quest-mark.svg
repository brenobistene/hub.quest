<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!--
    Monograma HQ — sans-serif geométrico bold. Renderiza branco em
    fundos escuros (sidebar, favicon dark). Usa stack de fontes do
    sistema com fallback Arial/sans pra consistência cross-browser.
  -->
  <text
    x="128" y="180"
    text-anchor="middle"
    font-family="Inter, 'Segoe UI', -apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="170"
    letter-spacing="-10"
    fill="#ffffff"
  >HQ</text>
</svg>
