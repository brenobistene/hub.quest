<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/hub-quest-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hub Quest</title>

    <style>
      @font-face {
        font-family: 'Satoshi';
        src: url('/fonts/Satoshi-Regular.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'Satoshi';
        src: url('/fonts/Satoshi-Bold.otf') format('opentype');
        font-weight: 700;
        font-style: normal;
      }
      @font-face {
        font-family: 'Satoshi';
        src: url('/fonts/Satoshi-Medium.otf') format('opentype');
        font-weight: 500;
        font-style: normal;
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        src: url('/fonts/IBMPlexMono-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        src: url('/fonts/IBMPlexMono-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
      }

      :root {
        /* Primary palette - dark & tactical */
        --color-bg-primary: #0a0908;
        --color-bg-secondary: #141618;
        --color-bg-tertiary: #1a1c1f;

        /* Text colors */
        --color-text-primary: #ece7e1;
        --color-text-secondary: #bdb0a0;
        --color-text-tertiary: #8c847e;
        --color-text-muted: #6d6762;

        /* Accents - red/crimson palette */
        --color-accent-primary: #8b2e2e;
        --color-accent-secondary: #a63a3a;
        --color-accent-light: #c46a5a;
        --color-accent-subtle: #5a3333;
        /* accent-vivid: bright orange-red, used for running-session highlights
           and "urgent" hover states. Brighter than accent-primary. */
        --color-accent-vivid: #e85d3a;

        /* Functional colors */
        --color-success: #5a7a6a;
        --color-success-light: #7a9a8a;
        --color-success-hover: #9ec4b4;
        --color-warning: #9d7a4a;
        --color-error: #8b2e2e;
        /* Purple: used for "retornar"/"reopen" affordances (neither
           destructive nor confirmational — a neutral undo). */
        --color-purple: #9d6cff;

        /* Border & divider */
        --color-border: #343638;
        --color-divider: #24272a;

        /* Gold accent (tactical elements) */
        --color-gold: #8b7a5a;

        /* Calendar routine blocks (week view) */
        --color-routine-block: #4a5566;
        --color-routine-block-border: #6b7a8f;

        /* Shadows */
        --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.4);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
        --shadow-lg: 0 8px 20px rgba(0, 0, 0, 0.6);
      }

      * {
        font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      html, body, #root {
        background-color: var(--color-bg-primary);
        color: var(--color-text-primary);
      }

      code, pre {
        font-family: 'IBM Plex Mono', 'Courier New', monospace;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
